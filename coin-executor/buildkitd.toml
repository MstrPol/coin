# Local pilot: Nexus Docker registry is plain HTTP inside docker-compose/k3s.
[registry."nexus:8082"]
  http = true
  insecure = true

[registry."localhost:8082"]
  http = true
  insecure = true

# Limit buildkit layer cache on agent pods (k3s ephemeral-storage).
[worker]
  gc = true
  gckeepstorage = 2000000000

[worker.oci]
  gc = true
  gckeepstorage = 2000000000
