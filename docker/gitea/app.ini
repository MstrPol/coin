# Эталон конфигурации Gitea для локального стенда.
# В compose используются GITEA__* env vars; конфиг пишется в volume:
#   /data/gitea/conf/app.ini
#
# Не монтируйте этот файл в /etc/gitea/app.ini — Gitea должна дописывать
# INTERNAL_TOKEN при первом migrate.

APP_NAME = Coin Git
RUN_MODE = prod

[repository]
ROOT = /data/git/repositories

[server]
DOMAIN = gitea
HTTP_PORT = 3000
ROOT_URL = http://gitea:3000/

[database]
DB_TYPE = sqlite3
PATH = /data/gitea/gitea.db

[security]
INSTALL_LOCK = true
SECRET_KEY = coin-local-gitea-secret-key-change-me

[service]
DISABLE_REGISTRATION = true
