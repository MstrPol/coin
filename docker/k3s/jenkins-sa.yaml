# Dev-only: SA для Jenkins Kubernetes plugin (локальный стенд).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-k8s
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: jenkins-k8s
    namespace: default
