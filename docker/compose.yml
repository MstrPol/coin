services:
  nexus:
    # 3.76.x — только amd64; для Apple Silicon нужен multi-arch тег (3.90+)
    image: sonatype/nexus3:${NEXUS_IMAGE_TAG:-3.91.1-alpine}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    ports:
      - "${NEXUS_HTTP_PORT:-8081}:8081"
      - "${NEXUS_DOCKER_PORT:-8082}:8082"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - coin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  k3s:
    image: rancher/k3s:v1.31.5-k3s1
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    privileged: true
    command:
      - server
      - --tls-san=k3s
      - --tls-san=localhost
      - --disable=traefik
      - --disable=servicelb
    environment:
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      K3S_KUBECONFIG_MODE: "666"
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - k3s-kubeconfig:/output
      - ./k3s/registries.yaml:/etc/rancher/k3s/registries.yaml:ro
      - ./k3s/dashboard:/dashboard:ro
      - ./k3s:/k3s:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${K3S_API_PORT:-6443}:6443"
      - "${K3S_DASHBOARD_PORT:-8443}:30443"
    networks:
      - coin

  gitea:
    image: gitea/gitea:1.22.6
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__repository__ROOT: /data/git/repositories
      GITEA__server__DOMAIN: gitea
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__ROOT_URL: http://gitea:3000/
      GITEA__server__DISABLE_SSH: "true"
      GITEA__server__START_SSH_SERVER: "false"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__SECRET_KEY: coin-local-gitea-secret-key-change-me
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__log__LEVEL: warn
    volumes:
      - gitea-data:/data
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
    networks:
      - coin

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      nexus:
        condition: service_started
      k3s:
        condition: service_started
      gitea:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "${JENKINS_HTTP_PORT:-8080}:8080"
      - "50000:50000"
    environment:
      JENKINS_ADMIN_USER: ${JENKINS_ADMIN_USER:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      JENKINS_HTTP_PORT: ${JENKINS_HTTP_PORT:-8080}
      GITEA_USER: ${GITEA_USER:-coin}
      GITEA_PASSWORD: ${GITEA_PASSWORD:-coin}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:-coin12345}
      COIN_API_TOKEN: ${COIN_API_TOKEN:-dev-local-token}
      COIN_PUBLISHER_API_KEY: ${COIN_PUBLISHER_API_KEY:-dev-local-publisher-key}
      KUBECONFIG_PATH: /kubeconfig/config
      COIN_REGISTRY_PREFIX: localhost:${NEXUS_DOCKER_PORT:-8082}/${NEXUS_DOCKER_REPO:-coin-docker}
      COIN_REGISTRY_RUNTIME_PREFIX: nexus:${NEXUS_DOCKER_PORT:-8082}/${NEXUS_DOCKER_REPO:-coin-docker}
    volumes:
      - jenkins-home:/var/jenkins_home
      - k3s-kubeconfig:/kubeconfig:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - coin

  postgres:
    image: postgres:16-alpine
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coin}
      POSTGRES_USER: ${POSTGRES_USER:-coin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coin}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - coin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coin} -d ${POSTGRES_DB:-coin}"]
      interval: 5s
      timeout: 5s
      retries: 10

  coin-api:
    build:
      context: ../coin-api
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nexus:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-coin}:${POSTGRES_PASSWORD:-coin}@postgres:5432/${POSTGRES_DB:-coin}?sslmode=disable
      COIN_API_ADDR: ":8090"
      AUTH_DISABLED: ${AUTH_DISABLED:-true}
      COIN_API_TOKEN: ${COIN_API_TOKEN:-dev-local-token}
      COIN_ADMIN_API_KEY: ${COIN_ADMIN_API_KEY:-dev-local-admin-key}
      COIN_PUBLISHER_API_KEY: ${COIN_PUBLISHER_API_KEY:-dev-local-publisher-key}
      COIN_READER_API_KEY: ${COIN_READER_API_KEY:-dev-local-reader-key}
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_ROLES_CLAIM: ${OIDC_ROLES_CLAIM:-roles}
      GITEA_URL: http://gitea:3000
      GITEA_USER: ${GITEA_USER:-coin}
      GITEA_PASSWORD: ${GITEA_PASSWORD:-coin}
      GIT_EXPORT_DISABLED: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NEXUS_URL: http://nexus:8081
      NEXUS_MAVEN_RELEASES: ${NEXUS_MAVEN_RELEASES:-maven-releases}
      NEXUS_MAVEN_SNAPSHOTS: ${NEXUS_MAVEN_SNAPSHOTS:-maven-snapshots}
      NEXUS_ADMIN_USER: admin
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:-coin12345}
    ports:
      - "${COIN_API_PORT:-8090}:8090"
    networks:
      - coin

  coin-ui:
    build:
      context: ../coin-ui
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      coin-api:
        condition: service_started
    ports:
      - "${COIN_UI_PORT:-8091}:80"
    networks:
      - coin

networks:
  coin:
    name: coin-net

volumes:
  nexus-data:
  k3s-data:
  k3s-kubeconfig:
  gitea-data:
  jenkins-home:
  postgres-data:
