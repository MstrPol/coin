jobs:
  - script: >
      pipelineJob('coin-cli') {
        description('Platform: coin CLI → Nexus Maven (zip)')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea:3000/coin/coin-cli.git')
                  credentials('gitea-git')
                }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
