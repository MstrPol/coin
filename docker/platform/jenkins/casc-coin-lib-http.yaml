# Phase 2: Nexus HTTP retriever для coin-lib Shared Library.
# Не загружается в Phase 1 — см. make coin-lib-http
unclassified:
  globalLibraries:
    libraries:
      - name: "coin-lib"
        defaultVersion: "1.0.0"
        implicit: false
        allowVersionOverride: true
        includeInChangesets: false
        retriever:
          http:
            credentialsId: "nexus-admin"
            url: "http://nexus:8081/repository/maven-releases/coin/lib/coin-lib/${library.coin-lib.version}/coin-lib-${library.coin-lib.version}.zip"
