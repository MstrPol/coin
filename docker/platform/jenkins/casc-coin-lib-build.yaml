jobs:
  - script: >
      pipelineJob('coin-lib') {
        description('Platform: Jenkins Shared Library ZIP → Nexus + coin-api register')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea:3000/coin/coin-lib.git')
                  credentials('gitea-git')
                }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
