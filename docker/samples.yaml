# Примеры продуктовых репозиториев → Gitea (make samples).
# repo — имя репозитория в Gitea (coin/<repo>).
# starter — каталог в coin-starters/.
# goldenPath — GP profile (по умолчанию = starter без суффикса -app, иначе явно).

samples:
  - repo: demo-go-app
    starter: go-app
    goldenPath: go-app

  - repo: demo-go-app-docker
    starter: go-app-docker
    goldenPath: go-app-docker

  - repo: demo-python-uv
    starter: python-uv-app

  - repo: demo-python-pip
    starter: python-pip-app

  - repo: demo-java-maven
    starter: java-maven-app

  - repo: demo-java-gradle
    starter: java-gradle-app
