schemaVersion: 2
name: trunk-based

branches:
  - name: main
    pattern: ^main$|^master$
    versioning:
      template: "v{base}-main-snapshot-{n}"
    publish: false

  - name: feature
    pattern: ^feature/(?P<jira>[A-Z][A-Z0-9]*-\d+)(?:-.+)?$
    versioning:
      template: "v{base}-{jira}-snapshot-{n}"
    publish: false

  - name: bugfix
    pattern: ^bugfix/(?P<jira>[A-Z][A-Z0-9]*-\d+)(?:-.+)?$
    versioning:
      template: "v{base}-{jira}-snapshot-{n}"
    publish: false

  - name: release
    pattern: ^release/(?P<jira>[A-Z][A-Z0-9]*-\d+)(?:-.+)?$
    versioning:
      template: "v{base}-{jira}-rc-{n}"
    publish: true
