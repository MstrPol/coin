jenkins:
  systemMessage: "Coin local prod-like stack (docker-compose)"
  # coinPipeline: шаг 1 (checkout + выбор образа) идёт на master до podTemplate
  numExecutors: 1
  mode: NORMAL
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD:-admin}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: gitea-git
              username: "${GITEA_USER:-coin}"
              password: "${GITEA_PASSWORD:-coin}"
              description: "Gitea Git credentials (dev only)"
          - usernamePassword:
              scope: GLOBAL
              id: nexus-admin
              username: "admin"
              password: "${NEXUS_ADMIN_PASSWORD:-coin12345}"
              description: "Nexus admin (local dev)"
          - usernamePassword:
              scope: GLOBAL
              id: nexus-docker
              username: "coin"
              password: "coin"
              description: "Local registry credentials (dev only)"
          - usernamePassword:
              scope: GLOBAL
              id: coin-publish-nexus-pypi
              username: "coin"
              password: "coin"
              description: "Local Nexus PyPI (dev only)"

unclassified:
  location:
    url: "http://localhost:${JENKINS_HTTP_PORT:-8080}/"
  globalLibraries:
    libraries:
      - name: coin-lib
        defaultVersion: "main"
        retriever:
          modernSCM:
            libraryPath: "coin-lib"
            scm:
              git:
                remote: "http://gitea:3000/coin/coin.git"
                credentialsId: "gitea-git"
