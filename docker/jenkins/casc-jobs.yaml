jobs:
  - script: >
      pipelineJob('coin-cli') {
        description('Platform: сборка coin CLI → Nexus raw/coin-cli')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea:3000/coin/coin.git')
                  credentials('gitea-git')
                }
                branch('main')
              }
            }
            scriptPath('coin-cli/Jenkinsfile')
          }
        }
      }
  - file: /usr/share/jenkins/ref/jobs/coin-agents.groovy
  - script: >
      pipelineJob('coin-demo-python-uv') {
        description('Smoke: python-uv-app через coinPipeline + Gitea SCM')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea:3000/coin/demo-python-uv.git')
                  credentials('gitea-git')
                }
                branch('main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
