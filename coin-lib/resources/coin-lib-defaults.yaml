# Jenkins glue defaults — lowest priority layer (lib < GP/manifest < project).
coin:
  apiUrl: http://coin-api:8090
  manifestCacheBase: http://nexus:8081/repository/maven-snapshots

jenkins:
  credentials:
    apiToken: coin-api-token
    nexus: nexus-admin
    docker: nexus-docker

pod:
  jnlp:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      memory: "4Gi"
