# Маппинг stack → CI agent image (runtime lookup для coin-lib).
# image tag = {runtime}-r{N} из coin-jenkins-agents/catalog.yaml (promote после сборки).
# coin CLI в agent image не зашивается — доставка в pipeline (coin-lib → Nexus).

coinCli:
  min: "0.1.0"

templates:
  go-app:
    stack: go
  java-gradle-app:
    stack: java-gradle
  java-maven-app:
    stack: java-maven
  python-uv-app:
    stack: python-uv
  python-pip-app:
    stack: python-pip

jnlp:
  image: jenkins/inbound-agent:3327.v868139a_d00e0-8

stacks:
  python-uv:
    "3.13":
      image: coin/ci-python-uv:3.13-r0
      digest: ""
      rev: 0

  python-pip:
    "3.13":
      image: coin/ci-python-pip:3.13-r0
      digest: ""
      rev: 0

  java-maven:
    "17":
      image: coin/ci-jvm-maven:17-r0
      digest: ""
      rev: 0

  java-gradle:
    "17":
      image: coin/ci-jvm-gradle:17-r0
      digest: ""
      rev: 0

  go:
    "1.22":
      image: coin/ci-go:1.22-r0
      digest: ""
      rev: 0

  node:
    "20":
      image: coin/ci-node:20
      digest: ""

tooling:
  image: coin/ci-tooling:latest
  digest: ""
