# Profile golden path python-uv-app/v1 — platform-owned.
# CI agent: coin-jenkins-agents/stacks/python-uv/3.13

agent:
  stack: python-uv
  runtime:
    python: "3.13"
  rev: 0

coinCli:
  version: "0.0.0-SNAPSHOT"

build:
  type: container
  dockerfile: Dockerfile
publish:
  kind: registry
  when: tag
pipeline:
  test:
    enabled: true
  build:
    enabled: true
  publish:
    enabled: true

container:
  port: 8080
  command: ["python", "-m", "my_service"]
