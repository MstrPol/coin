# CI agent: coin-jenkins-agents/stacks/java-maven/17
agent:
  stack: java-maven
  runtime:
    java: "17"
  rev: 0

coinCli:
  version: "0.0.0-SNAPSHOT"

build:
  type: container
  dockerfile: Dockerfile
publish:
  kind: registry
  when: tag
pipeline:
  test:
    enabled: true
  build:
    enabled: true
  publish:
    enabled: true

container:
  port: 8080
  command: ["java", "-jar", "/app/app.jar"]
