# Profile golden path go-app/v1 — platform-owned.
# CI agent: coin-jenkins-agents/stacks/go/1.22

agent:
  stack: go
  runtime:
    go: "1.22"
  rev: 2

coinCli:
  version: "0.0.0-SNAPSHOT"

build:
  type: container
  dockerfile: Dockerfile

publish:
  kind: registry
  when: tag

pipeline:
  test:
    enabled: true
  build:
    enabled: true
  publish:
    enabled: true

container:
  port: 8080
  command: ["/app/app"]
