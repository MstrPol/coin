# CI agent images — manifest.
# tag = {runtime}-r{N}; digest — pin текущего артефакта (обновляет Jenkins job agents-build).

registry:
  default: nexus:8082/coin-docker
  credentialsId: nexus-docker

stacks:
  go:
    "1.22":
      image: ci-go
      rev: 0
      tag: ""
      digest: ""
      dockerfile: stacks/go/1.22/Dockerfile

  python-uv:
    "3.13":
      image: ci-python-uv
      rev: 0
      tag: ""
      digest: ""
      dockerfile: stacks/python-uv/3.13/Dockerfile
      pins:
        uv: "0.6.14"

  python-pip:
    "3.13":
      image: ci-python-pip
      rev: 0
      tag: ""
      digest: ""
      dockerfile: stacks/python-pip/3.13/Dockerfile

  java-maven:
    "17":
      image: ci-jvm-maven
      rev: 0
      tag: ""
      digest: ""
      dockerfile: stacks/java-maven/17/Dockerfile

  java-gradle:
    "17":
      image: ci-jvm-gradle
      rev: 0
      tag: ""
      digest: ""
      dockerfile: stacks/java-gradle/17/Dockerfile
