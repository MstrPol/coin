services:

  gitea:
    image: gitea/gitea:1.22.6
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - gitea-data:/data
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
    networks:
      - coin

  nexus:
    # 3.76.x — только amd64; для Apple Silicon нужен multi-arch тег (3.90+)
    image: sonatype/nexus3:${NEXUS_IMAGE_TAG:-3.91.1-alpine}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    ports:
      - "${NEXUS_HTTP_PORT:-8081}:8081"
      - "${NEXUS_DOCKER_PORT:-8082}:8082"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - coin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  k3s:
    image: rancher/k3s:v1.31.5-k3s1
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    privileged: true
    command:
      - server
      - --tls-san=k3s
      - --tls-san=localhost
      - --disable=traefik
      - --disable=servicelb
      # local pilot: buildpack builder pull (~2–3 GiB в podman) не должен evict'ить agent pod
      - --kubelet-arg=eviction-hard=nodefs.available<1%,imagefs.available<1%
      - --kubelet-arg=eviction-minimum-reclaim=nodefs.available=1%,imagefs.available=1%
    environment:
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      K3S_KUBECONFIG_MODE: "666"
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - k3s-kubeconfig:/output
      - ./k3s/registries.yaml:/etc/rancher/k3s/registries.yaml:ro
      - ./k3s/dashboard:/dashboard:ro
      - ./k3s:/k3s:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${K3S_API_PORT:-6443}:6443"
      - "${K3S_DASHBOARD_PORT:-8443}:30443"
    networks:
      - coin

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      nexus:
        condition: service_started
      k3s:
        condition: service_started
      gitea:
        condition: service_started
    ports:
      - "${JENKINS_HTTP_PORT:-8080}:8080"
      - "50000:50000"
    environment:
      JENKINS_ADMIN_USER: ${JENKINS_ADMIN_USER:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      JENKINS_HTTP_PORT: ${JENKINS_HTTP_PORT:-8080}
      GITEA_USER: ${GITEA_USER:-coin}
      GITEA_PASSWORD: ${GITEA_PASSWORD:-coin}
      NEXUS_ADMIN_PASSWORD: ${NEXUS_ADMIN_PASSWORD:-coin12345}
      NEXUS_DOCKER_PASSWORD: ${NEXUS_DOCKER_PASSWORD:-coin1234}
      COIN_API_TOKEN: ${COIN_API_TOKEN:-dev-local-token}
      COIN_PUBLISHER_API_KEY: ${COIN_PUBLISHER_API_KEY:-dev-local-publisher-key}
      KUBECONFIG_PATH: /kubeconfig/config
      COIN_REGISTRY_RUNTIME_PREFIX: nexus:${NEXUS_DOCKER_PORT:-8082}/${NEXUS_DOCKER_REPO:-coin-docker}
    volumes:
      - jenkins-home:/var/jenkins_home
      - k3s-kubeconfig:/kubeconfig:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - coin

networks:
  coin:
    name: coin-net

volumes:
  nexus-data:
  k3s-data:
  k3s-kubeconfig:
  gitea-data:
  jenkins-home:
