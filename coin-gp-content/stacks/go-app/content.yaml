name: go-app
kind: gp-content
capabilities:
  deliverables:
    - image
    - liquibase-image
    - artifact
controls:
  skipTests:
    type: boolean
    default: false
  publishMode:
    type: choice
    values: [auto, never, force]
    default: auto
  snapshot:
    type: boolean
    default: true
  bump:
    type: choice
    values: [none, patch, minor, major]
    default: none
stages:
  - name: validate
    artifactKey: scripts/validate.sh
  - name: test
    artifactKey: scripts/test.sh
    when: always
  - name: build
    artifactKey: scripts/build.sh
  - name: publish
    artifactKey: scripts/publish.sh
    when: tag
validateSchema:
  artifactKey: schemas/config.v2.schema.json
dockerfileTemplate:
  artifactKey: dockerfiles/go-runtime.Dockerfile
