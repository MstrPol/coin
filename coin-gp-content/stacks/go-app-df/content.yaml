name: go-app-df
kind: gp-content
capabilities:
  deliverables:
    - image
controls:
  skipTests:
    type: boolean
    default: false
  publishMode:
    type: choice
    values: [auto, never, force]
    default: auto
  snapshot:
    type: boolean
    default: true
  bump:
    type: choice
    values: [none, patch, minor, major]
    default: none
build:
  engine: dockerfile
  dockerfile:
    imageTarget: runtime
    testTarget: test
    cacheRefTemplate: "{{registryHost}}/coin-cache/{{project}}:dockerfile"
pipeline:
  stages:
    - id: validate
      name: Validate
    - id: test
      name: Test
    - id: build
      name: Build
    - id: publish
      name: Publish
      when: tag
validateSchema:
  artifactKey: schemas/config.v2.schema.json
containerfile:
  artifactKey: dockerfiles/Containerfile
