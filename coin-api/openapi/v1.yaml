openapi: 3.1.0
info:
  title: Coin Control Plane API
  version: 1.0.0
  description: Resolve manifest and build telemetry for Coin CI.

servers:
  - url: http://localhost:8090
    description: Local docker compose

paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK

  /ready:
    get:
      summary: Readiness probe (PostgreSQL ping)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /openapi/v1.yaml:
    get:
      summary: OpenAPI specification (YAML)
      responses:
        "200":
          description: OpenAPI document
          content:
            application/yaml:
              schema:
                type: string

  /docs/:
    get:
      summary: Swagger UI
      responses:
        "200":
          description: HTML Swagger UI
          content:
            text/html:
              schema:
                type: string

  /v1/golden-paths/{name}/version:
    get:
      summary: Resolve coin-lib version for Jenkins bootstrap
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: pin
          in: query
          required: true
          schema:
            type: string
          example: "~1.0.0"
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lib version for dynamic library() call
          content:
            application/json:
              schema:
                type: object
                properties:
                  goldenPath:
                    type: string
                  resolvedVersion:
                    type: string
                  library:
                    type: object
                    properties:
                      type:
                        type: string
                        example: lib
                      name:
                        type: string
                        example: coin-lib
                      version:
                        type: string
                        example: "1.0.0"
        "404":
          description: GP release not found

  /v1/golden-paths/{name}/resolve:
    get:
      summary: Resolve manifest by semver pin
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: pin
          in: query
          required: true
          schema:
            type: string
          description: Semver pin (=1.0.0, ~1.0.0, ^1.0.0, *, or bare 1.0.0)
          example: "~1.0.0"
        - name: project
          in: query
          schema:
            type: string
          description: Project name for canary rules (MVP-3)
      responses:
        "200":
          description: Resolved manifest
          headers:
            X-Coin-Requested-Pin:
              schema:
                type: string
            X-Coin-Resolved-Version:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"
        "400":
          description: Invalid pin
        "404":
          description: GP release not found

  /v1/golden-paths/{name}/versions/{version}/manifest:
    get:
      summary: Resolve immutable manifest for GP release
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: version
          in: path
          required: true
          schema:
            type: string
          example: "1.0.0"
      responses:
        "200":
          description: Resolved manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"
        "404":
          description: GP release not found
        "403":
          description: Version below catalog minimum
        "401":
          description: Unauthorized

  /v1/builds/report:
    post:
      summary: Report build telemetry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildReport"
      responses:
        "201":
          description: Accepted
        "401":
          description: Unauthorized

  /v1/admin/stats:
    get:
      summary: Dashboard counts
      security:
        - adminKey: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized

  /v1/admin/build-reports:
    get:
      summary: List build reports
      security:
        - adminKey: []
      parameters:
        - name: project
          in: query
          schema:
            type: string
        - name: goldenPath
          in: query
          schema:
            type: string
        - name: result
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Build report list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/BuildReportRow"
        "401":
          description: Unauthorized

  /v1/admin/projects:
    get:
      summary: List projects (registry from build reports)
      security:
        - adminKey: []
      parameters:
        - name: goldenPath
          in: query
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
        - name: stale
          in: query
          schema:
            type: boolean
          description: Only projects without build in 90 days
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
        "401":
          description: Unauthorized

  /v1/admin/golden-paths:
    get:
      summary: List published GP releases
      security:
        - adminKey: []
      parameters:
        - name: name
          in: query
          schema:
            type: string
          example: go-app
      responses:
        "200":
          description: GP release list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPReleaseList"
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions:
    post:
      summary: Publish component version (append-only)
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          example: executor
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: coin-executor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishComponentVersion"
      responses:
        "201":
          description: Published
        "409":
          description: Version already exists
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions:
    post:
      summary: Publish GP release (append-only)
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishGPRelease"
      responses:
        "201":
          description: Published
        "400":
          description: Invalid composition or compatibility failure
        "409":
          description: GP version already exists
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions/{version}/blast-radius:
    get:
      summary: Blast radius — projects on GP versions
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: version
          in: path
          required: true
          schema:
            type: string
          example: "1.0.2"
      responses:
        "200":
          description: Blast radius counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlastRadius"
        "401":
          description: Unauthorized

  /v1/admin/platform/settings:
    get:
      summary: Global platform settings (Nexus defaults)
      security:
        - adminKey: []
      responses:
        "200":
          description: Platform settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
        "401":
          description: Unauthorized
    put:
      summary: Update platform settings
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSettingsUpdate"
      responses:
        "200":
          description: Updated
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/resolve-preview:
    get:
      summary: Resolve preview (admin debug)
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: pin
          in: query
          required: true
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
        - name: forceChannel
          in: query
          schema:
            type: string
            enum: [canary, stable]
      responses:
        "200":
          description: Resolve preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvePreviewResult"
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/projects/{project}/canary-context:
    get:
      summary: Canary audience context for project
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Canary context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanaryContext"
        "401":
          description: Unauthorized

  /v1/admin/components:
    get:
      summary: List component registry
      security:
        - adminKey: []
      responses:
        "200":
          description: Component list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentList"
        "401":
          description: Unauthorized

  /v1/admin/components/agent/{name}/next-version:
    get:
      summary: Next agent version ({runtime}-r{N+1}) for agents-build
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Agent stack (component name), e.g. go
        - name: runtime
          in: query
          required: true
          schema:
            type: string
          example: "1.22"
      responses:
        "200":
          description: Next version allocation preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextAgentVersion"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}:
    get:
      summary: Component detail with GP usage
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Component detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentDetail"
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions/{version}:
    get:
      summary: Component version detail (metadata, contentRef)
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentVersionDetail"
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions/{version}:
    get:
      summary: GP release detail with composition
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: GP release detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPReleaseDetail"
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /v1/admin/me:
    get:
      summary: Current admin principal and RBAC roles
      security:
        - adminKey: []
      responses:
        "200":
          description: Principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPrincipal"
        "401":
          description: Unauthorized

  /v1/admin/audit-log:
    get:
      summary: Audit log (append-only mutations)
      security:
        - adminKey: []
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
          example: gp_release
        - name: action
          in: query
          schema:
            type: string
          example: publish_gp_release
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/names:
    get:
      summary: Supported golden path names (publish wizard)
      security:
        - adminKey: []
      responses:
        "200":
          description: GP names
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: string
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/profile:
    get:
      summary: GP composition slots for publish wizard
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
      responses:
        "200":
          description: GP profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPProfile"
        "404":
          description: Unknown golden path
        "401":
          description: Unauthorized

  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics payload

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    adminKey:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Manifest:
      type: object
      required:
        - manifestVersion
        - manifestHash
        - goldenPath
        - executor
        - runtime
        - pipeline
        - orchestration
      properties:
        manifestVersion:
          type: integer
          example: 1
        manifestHash:
          type: string
          example: "sha256:abc..."
        goldenPath:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
            version:
              type: string
        executor:
          type: object
          properties:
            version:
              type: string
            url:
              type: string
            sha256:
              type: string
        runtime:
          type: object
          properties:
            image:
              type: string
            digest:
              type: string
        pipeline:
          type: object
          properties:
            stages:
              type: array
              items:
                type: object
        orchestration:
          $ref: "#/components/schemas/ContentRef"
        validateSchema:
          $ref: "#/components/schemas/ContentRef"
        dockerfileTemplate:
          $ref: "#/components/schemas/ContentRef"
        credentials:
          type: object
          additionalProperties:
            type: string

    ContentRef:
      type: object
      required: [url, sha256]
      properties:
        url:
          type: string
          format: uri
          description: Nexus URL of immutable content artifact
        sha256:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"

    BuildReport:
      type: object
      required: [project, goldenPath, version, result]
      properties:
        project:
          type: string
        groupId:
          type: string
        artifactId:
          type: string
        goldenPath:
          type: string
        version:
          type: string
        configVersion:
          type: string
        branch:
          type: string
        buildUrl:
          type: string
        gitUrl:
          type: string
        result:
          type: string
          enum: [success, failure, aborted]
        channel:
          type: string
        requestedPin:
          type: string
        resolvedVersion:
          type: string
        failedStage:
          type: string
        outputs:
          type: array
          items:
            type: object
            required: [name, type]
            properties:
              name:
                type: string
              type:
                type: string
                enum: [image, liquibase-image, artifact]
              format:
                type: string
                example: zip
              ref:
                type: string
              digest:
                type: string
              sha256:
                type: string

    BuildReportRow:
      allOf:
        - $ref: "#/components/schemas/BuildReport"
        - type: object
          required: [id, reportedAt]
          properties:
            id:
              type: integer
            reportedAt:
              type: string
              format: date-time

    PublishComponentVersion:
      type: object
      required: [version]
      properties:
        version:
          type: string
          example: "0.2.0"
        metadata:
          type: object
          additionalProperties: true
        contentRef:
          type: object
          additionalProperties: true
        actor:
          type: string
          example: platform-bot

    PublishGPRelease:
      type: object
      required: [version, composition]
      properties:
        version:
          type: string
          example: "1.0.1"
        composition:
          type: object
          additionalProperties:
            type: string
          example:
            executor: "0.1.0"
            agent: "1.22.5"
            pipeline: "2.1.0"
            validate: "1.0.0"
            dockerfile: "1.0.0"
        gitExportTag:
          type: string
          example: go-app/v1.0.1
        actor:
          type: string

    BlastRadius:
      type: object
      required: [goldenPath, version, onThisVersion, onOtherVersions, onOlderVersions, totalOnGP, byVersion]
      properties:
        goldenPath:
          type: string
        version:
          type: string
        onThisVersion:
          type: integer
        onOtherVersions:
          type: integer
        onOlderVersions:
          type: integer
        totalOnGP:
          type: integer
        byVersion:
          type: array
          items:
            type: object
            required: [version, count]
            properties:
              version:
                type: string
              count:
                type: integer

    ReadyResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ready
        version:
          type: string
          example: "0.1.0"
        reason:
          type: string
          description: Present when status is not ready

    DashboardStats:
      type: object
      required: [projects, staleProjects, gpReleases, buildReports, goldenPaths]
      properties:
        projects:
          type: integer
        staleProjects:
          type: integer
        gpReleases:
          type: integer
        buildReports:
          type: integer
        goldenPaths:
          type: integer

    Project:
      type: object
      required: [name, goldenPath, version]
      properties:
        name:
          type: string
        groupId:
          type: string
        artifactId:
          type: string
        gitRepoName:
          type: string
        gitRepoUrl:
          type: string
        goldenPath:
          type: string
        version:
          type: string
        canaryMode:
          type: string
        branch:
          type: string
        lastBuildAt:
          type: string
          format: date-time

    PlatformSettings:
      type: object
      required: [nexusMavenBase, nexusCredentialsId, updatedAt]
      properties:
        nexusMavenBase:
          type: string
        nexusCredentialsId:
          type: string
        updatedAt:
          type: string
          format: date-time

    PlatformSettingsUpdate:
      type: object
      required: [nexusMavenBase, nexusCredentialsId]
      properties:
        nexusMavenBase:
          type: string
        nexusCredentialsId:
          type: string
        actor:
          type: string

    CanaryContext:
      type: object
      required:
        - project
        - gpName
        - canaryMode
        - rolloutEnabled
        - canaryPercent
        - projectBucket
        - useCanaryLine
        - stableVersion
        - canaryVersion
      properties:
        project:
          type: string
        gpName:
          type: string
        canaryMode:
          type: string
        rolloutEnabled:
          type: boolean
        canaryPercent:
          type: integer
        projectBucket:
          type: integer
        useCanaryLine:
          type: boolean
        stableVersion:
          type: string
        canaryVersion:
          type: string

    ResolvePreviewResult:
      type: object
      required: [requestedPin, resolvedVersion, channel, manifest]
      properties:
        requestedPin:
          type: string
        resolvedVersion:
          type: string
        channel:
          type: string
        manifest:
          type: object
          additionalProperties: true
        canaryContext:
          $ref: "#/components/schemas/CanaryContext"

    ComponentDetail:
      allOf:
        - $ref: "#/components/schemas/Component"
        - type: object
          required: [gpUsage]
          properties:
            gpUsage:
              type: array
              items:
                type: object
                required: [gpName, version, status]
                properties:
                  gpName:
                    type: string
                  version:
                    type: string
                  status:
                    type: string

    NextAgentVersion:
      type: object
      required: [stack, runtime, currentRev, nextRev, nextVersion]
      properties:
        stack:
          type: string
        runtime:
          type: string
        currentRev:
          type: integer
          description: Max existing -rN for runtime (0 if none)
        nextRev:
          type: integer
        nextVersion:
          type: string
          example: "1.22-r6"

    ComponentVersionDetail:
      type: object
      required: [type, name, version, status, metadata, createdAt]
      properties:
        type:
          type: string
        name:
          type: string
        version:
          type: string
        status:
          type: string
        metadata:
          type: object
          additionalProperties: true
        contentRef:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    ProjectList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"

    GPRelease:
      type: object
      required: [name, version, status, createdAt]
      properties:
        name:
          type: string
        version:
          type: string
        status:
          type: string
        manifestHash:
          type: string
        manifestUrl:
          type: string
        gitExportTag:
          type: string
        createdAt:
          type: string
          format: date-time

    GPReleaseList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GPRelease"

    Component:
      type: object
      required: [type, name, versionCount, latestCreatedAt]
      properties:
        type:
          type: string
        name:
          type: string
        latestVersion:
          type: string
        versionCount:
          type: integer
        latestCreatedAt:
          type: string
          format: date-time

    ComponentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Component"

    CompositionItem:
      type: object
      required: [type, name, version]
      properties:
        type:
          type: string
        name:
          type: string
        version:
          type: string

    GPReleaseDetail:
      allOf:
        - $ref: "#/components/schemas/GPRelease"
        - type: object
          required: [composition]
          properties:
            composition:
              type: array
              items:
                $ref: "#/components/schemas/CompositionItem"

    AuditLogEntry:
      type: object
      required: [id, action, entityType, entityKey, payload, createdAt]
      properties:
        id:
