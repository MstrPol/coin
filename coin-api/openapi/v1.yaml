openapi: 3.1.0
info:
  title: Coin Control Plane API
  version: 1.0.0
  description: Resolve manifest and build telemetry for Coin CI.

servers:
  - url: http://localhost:8090
    description: Local docker compose

paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK

  /ready:
    get:
      summary: Readiness probe (PostgreSQL ping)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /openapi/v1.yaml:
    get:
      summary: OpenAPI specification (YAML)
      responses:
        "200":
          description: OpenAPI document
          content:
            application/yaml:
              schema:
                type: string

  /docs/:
    get:
      summary: Swagger UI
      responses:
        "200":
          description: HTML Swagger UI
          content:
            text/html:
              schema:
                type: string

  /v1/golden-paths/{name}/resolve:
    get:
      summary: Resolve manifest by semver pin
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: pin
          in: query
          required: true
          schema:
            type: string
          description: Semver pin (=1.0.0, ~1.0.0, ^1.0.0, *, or bare 1.0.0)
          example: "~1.0.0"
        - name: project
          in: query
          schema:
            type: string
          description: Project name for canary rules (MVP-3)
      responses:
        "200":
          description: Resolved manifest
          headers:
            X-Coin-Requested-Pin:
              schema:
                type: string
            X-Coin-Resolved-Version:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"
        "400":
          description: Invalid pin
        "404":
          description: GP release not found

  /v1/golden-paths/{name}/versions/{version}/manifest:
    get:
      summary: Resolve immutable manifest for GP release
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: version
          in: path
          required: true
          schema:
            type: string
          example: "1.0.0"
      responses:
        "200":
          description: Resolved manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"
        "404":
          description: GP release not found
        "403":
          description: Version below catalog minimum
        "401":
          description: Unauthorized

  /v1/builds/report:
    post:
      summary: Report build telemetry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildReport"
      responses:
        "201":
          description: Accepted
        "401":
          description: Unauthorized

  /v1/admin/stats:
    get:
      summary: Dashboard counts
      security:
        - adminKey: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized

  /v1/admin/build-reports:
    get:
      summary: List build reports (paginated)
      security:
        - adminKey: []
      parameters:
        - name: project
          in: query
          schema:
            type: string
        - name: goldenPath
          in: query
          schema:
            type: string
        - name: result
          in: query
          schema:
            type: string
        - name: reportedAfter
          in: query
          schema:
            type: string
          description: Inclusive start (YYYY-MM-DD or RFC3339)
        - name: reportedBefore
          in: query
          schema:
            type: string
          description: Inclusive end (YYYY-MM-DD or RFC3339)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Build report list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedListMeta"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/BuildReportRow"
        "400":
          description: Invalid date filter
        "401":
          description: Unauthorized

  /v1/admin/build-reports/export:
    get:
      summary: Export build reports as CSV (all matching filters)
      security:
        - adminKey: []
      parameters:
        - name: project
          in: query
          schema:
            type: string
        - name: goldenPath
          in: query
          schema:
            type: string
        - name: result
          in: query
          schema:
            type: string
        - name: reportedAfter
          in: query
          schema:
            type: string
        - name: reportedBefore
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "400":
          description: Invalid date filter
        "401":
          description: Unauthorized

  /v1/admin/projects:
    get:
      summary: List projects (paginated)
      security:
        - adminKey: []
      parameters:
        - name: goldenPath
          in: query
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
        - name: stale
          in: query
          schema:
            type: boolean
          description: Only projects without build in 90 days
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedListMeta"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized

  /v1/admin/projects/export:
    get:
      summary: Export projects as CSV (all matching filters)
      security:
        - adminKey: []
      parameters:
        - name: goldenPath
          in: query
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
        - name: stale
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "401":
          description: Unauthorized

  /v1/admin/golden-paths:
    get:
      summary: List published GP releases
      security:
        - adminKey: []
      parameters:
        - name: name
          in: query
          schema:
            type: string
          example: go-app
      responses:
        "200":
          description: GP release list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPReleaseList"
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions:
    post:
      summary: Publish component version (append-only)
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          example: executor
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: coin-executor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishComponentVersion"
      responses:
        "201":
          description: Published
        "409":
          description: Version already exists
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions/drafts:
    post:
      summary: Register component version as draft
      description: |
        Creates a component version with `status = draft`.
        For `agent`, `version` is derived from the image tag in `metadata.image` when omitted.
        If `version` is sent for `agent`, it MUST match the parsed image tag (CI register path).
        `metadata.image` is required for `agent`; `metadata.digest` optional at create, required at promote.
        Returns HTTP 422 when image tag is missing, profile mismatch, or version/tag mismatch.
        Idempotent for CI: duplicate version returns HTTP 409.
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          example: agent
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: coin-agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishComponentVersion"
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentVersionPromoteResult"
        "409":
          description: Version already exists (idempotent for CI retries)
        "422":
          description: Agent image parse or version/tag mismatch
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions:
    post:
      summary: Publish GP release (append-only)
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishGPRelease"
      responses:
        "201":
          description: Published
        "400":
          description: Invalid composition or compatibility failure
        "409":
          description: GP version already exists
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions/{version}/blast-radius:
    get:
      summary: Blast radius — projects on GP versions
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: version
          in: path
          required: true
          schema:
            type: string
          example: "1.0.2"
      responses:
        "200":
          description: Blast radius counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlastRadius"
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/resolve-preview:
    get:
      summary: Resolve preview (admin debug)
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: pin
          in: query
          required: true
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
        - name: forceChannel
          in: query
          schema:
            type: string
            enum: [canary, stable]
      responses:
        "200":
          description: Resolve preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvePreviewResult"
        "401":
          description: Unauthorized

  /v1/admin/branching-models/preview:
    post:
      summary: Preview branching model scenarios (executor SoT)
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchingModelPreviewRequest"
      responses:
        "200":
          description: Preview evaluation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchingModelPreviewResult"
        "400":
          description: Invalid model or scenarios
        "401":
          description: Unauthorized

  /v1/admin/gp-content/preview:
    post:
      summary: Preview gp-content manifest subset (executor SoT)
      security:
        - adminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpContentPreviewRequest"
      responses:
        "200":
          description: Preview build/pipeline fragment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpContentPreviewResult"
        "400":
          description: Invalid content yaml
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/projects/{project}/canary-context:
    get:
      summary: Canary audience context for project
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: project
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Canary context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanaryContext"
        "401":
          description: Unauthorized

  /v1/admin/components:
    get:
      summary: List component registry
      security:
        - adminKey: []
      responses:
        "200":
          description: Component list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentList"
        "401":
          description: Unauthorized

  /v1/admin/components/agent/{name}/next-version:
    get:
      summary: Next agent version ({runtime}-r{N+1}); legacy stack agents only (coin-agent uses semver via publish-agent)
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Agent component name (legacy stack, e.g. go) or coin-agent
        - name: runtime
          in: query
          required: true
          schema:
            type: string
          example: "1.22"
      responses:
        "200":
          description: Next version allocation preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextAgentVersion"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}:
    get:
      summary: Component detail with GP usage
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Component detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentDetail"
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions/{version}:
    get:
      summary: Component version detail (metadata, contentRef)
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentVersionDetail"
        "404":
          description: Not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete component version draft
      description: |
        Removes a component version with `status = draft` from PostgreSQL.
        Cascade-deletes artifact bodies; does not modify Nexus.
        Published versions are immutable (HTTP 409).
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
        - name: actor
          in: query
          schema:
            type: string
      responses:
        "204":
          description: Draft deleted
        "404":
          description: Not found
        "409":
          description: Version is not draft
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions/{version}/validate-package:
    post:
      summary: Validate draft package before Nexus register (Component Studio)
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validation passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateComponentPackageResult"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateComponentPackageResult"
        "404":
          description: Draft version not found
        "409":
          description: Version is not draft
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions/{version}/register-package:
    post:
      summary: Upload draft artifact bodies to Nexus and register content_ref v2
      description: Component Studio backend — builds package.manifest.json from PG draft bodies, uploads to Nexus, updates content_ref.
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterComponentPackage"
      responses:
        "200":
          description: Package registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterComponentPackageResult"
        "400":
          description: Validation or upload error
        "404":
          description: Draft version not found
        "409":
          description: Version is not draft
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions/{version}/promote:
    post:
      summary: Publish component version (draft → published)
      description: |
        Promotes a draft component version to `published`.
        For `gp-content` and `branching-model`, validates registered package and uploads to Nexus when needed.
        For `agent`, promotes using metadata only (no Nexus content_ref required).
        Returns HTTP 422 when `metadata.image` or `metadata.digest` is missing or invalid.
        Legacy component status `canary` is accepted as input but new writes use draft→published only.
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                actor:
                  type: string
      responses:
        "200":
          description: Component published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentVersionPromoteResult"
        "404":
          description: Version not found
        "409":
          description: Invalid status or package not registered
        "422":
          description: Agent metadata validation failed (missing image/digest or tag mismatch)
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions/{version}:
    get:
      summary: GP release detail with composition
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: GP release detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPReleaseDetail"
        "404":
          description: Not found
        "401":
          description: Unauthorized
    delete:
      summary: Delete GP draft release
      description: Only releases with status draft may be deleted. Published releases are immutable.
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
        - name: actor
          in: query
          schema:
            type: string
      responses:
        "204":
          description: Draft deleted
        "404":
          description: Not found
        "409":
          description: Published release cannot be deleted
        "401":
          description: Unauthorized
    patch:
      summary: Update GP draft composition
      description: Only releases with status draft may be updated. Published releases are immutable.
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGPDraft"
      responses:
        "200":
          description: Draft updated
        "400":
          description: Invalid composition
        "404":
          description: Not found
        "409":
          description: Published release cannot be updated
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions/{version}/promote:
    post:
      summary: Promote GP draft release to published
      description: |
        Re-validates composition; all component pins must be `published`.
        Returns HTTP 409 with `blockingPins` when draft pins block promote.
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
        - name: actor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: GP release promoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishGPReleaseResult"
        "404":
          description: Draft not found
        "409":
          description: Composition has draft pins or duplicate published version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPPromoteBlockedError"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /v1/admin/me:
    get:
      summary: Current admin principal and RBAC roles
      security:
        - adminKey: []
      responses:
        "200":
          description: Principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPrincipal"
        "401":
          description: Unauthorized

  /v1/admin/audit-log:
    get:
      summary: Audit log (append-only mutations)
      security:
        - adminKey: []
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
          example: gp_release
        - name: action
          in: query
          schema:
            type: string
          example: publish_gp_release
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/names:
    get:
      summary: Supported golden path names (publish wizard)
      security:
        - adminKey: []
      responses:
        "200":
          description: GP names
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: string
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/profile:
    get:
      summary: GP composition slots for publish wizard
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
      responses:
        "200":
          description: GP profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPProfile"
        "404":
          description: Unknown golden path
        "401":
          description: Unauthorized

  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics payload

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    adminKey:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Manifest:
      type: object
      required:
        - manifestVersion
        - manifestHash
        - goldenPath
        - runtime
        - build
        - pipeline
      properties:
        manifestVersion:
          type: integer
          example: 1
        manifestHash:
          type: string
          example: "sha256:abc..."
        goldenPath:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
            version:
              type: string
        runtime:
          type: object
          required: [image]
          properties:
            image:
              type: string
              description: Universal coin-agent image ref
            digest:
              type: string
        branching:
          type: object
          description: Branching model rules from composition branching-model slot (schema v2)
          required: [name, version, branches]
          properties:
            name:
              type: string
            version:
              type: string
            branches:
              type: array
              items:
                $ref: "#/components/schemas/BranchingModelBranchRule"
          additionalProperties: false
        build:
          $ref: "#/components/schemas/ManifestBuild"
        pipeline:
          type: object
          required: [stages]
          properties:
            stages:
              type: array
              items:
                $ref: "#/components/schemas/ManifestStage"
        validateSchema:
          $ref: "#/components/schemas/ContentRef"
        credentials:
          type: object
          additionalProperties:
            type: string
        capabilities:
          type: object
          additionalProperties: true

    ManifestBuild:
      type: object
      required: [engine]
      properties:
        engine:
          type: string
          enum: [buildkit, dockerfile]
        buildkit:
          $ref: "#/components/schemas/ManifestBuildkit"
        dockerfile:
          $ref: "#/components/schemas/ManifestDockerfileEngine"

    ManifestDockerfileEngine:
      type: object
      required: [dockerfile]
      properties:
        dockerfile:
          type: string
          description: Path to Dockerfile in product workspace (BYO)
          example: Dockerfile
        imageTarget:
          type: string
          example: runtime
        testTarget:
          type: string
          example: test
        cacheRef:
          type: string
          example: "localhost:8082/coin-cache/demo-go-app:dockerfile"

    ManifestBuildkit:
      type: object
      required: [dockerfile, targets, containerfile]
      properties:
        dockerfile:
          type: string
          description: Resolved path in workspace, e.g. .coin/Containerfile
          example: ".coin/Containerfile"
        targets:
          type: object
          additionalProperties:
            type: string
          example:
            validate: validate
            test: test
            image: runtime
            artifact: artifact
        cacheRef:
          type: string
          example: "localhost:8082/coin-cache/demo-go-app:buildkit"
        containerfile:
          $ref: "#/components/schemas/ContentRef"

    ManifestStage:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          example: validate
        name:
          type: string
          example: Validate
        when:
          type: string
          example: tag

    GPContentContentRef:
      type: object
      required: [pipeline, build, validateSchema]
      properties:
        pipeline:
          type: object
          required: [stages]
          properties:
            stages:
              type: array
              items:
                $ref: "#/components/schemas/ManifestStage"
        build:
          type: object
          required: [engine]
          properties:
            engine:
              type: string
              enum: [buildkit, dockerfile]
            buildkit:
              type: object
              properties:
                targets:
                  type: object
                  additionalProperties:
                    type: string
                cacheRefTemplate:
                  type: string
                  example: "{{registryHost}}/coin-cache/{{project}}:buildkit"
            dockerfile:
              type: object
              properties:
                path:
                  type: string
                  example: Dockerfile
                imageTarget:
                  type: string
                  example: runtime
                testTarget:
                  type: string
                  example: test
                cacheRefTemplate:
                  type: string
                  example: "{{registryHost}}/coin-cache/{{project}}:dockerfile"
        capabilities:
          type: object
          properties:
            deliverables:
              type: array
              items:
                type: string
                enum: [image, artifact]
        validateSchema:
          type: object
          required: [artifactKey, sha256]
          properties:
            artifactKey:
              type: string
            sha256:
              type: string
        containerfile:
          type: object
          required: [artifactKey, sha256]
          properties:
            artifactKey:
              type: string
            sha256:
              type: string

    ContentRef:
      type: object
      required: [url, sha256]
      properties:
        url:
          type: string
          format: uri
          description: Nexus URL of immutable content artifact
        sha256:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"

    ContentRefV2:
      type: object
      additionalProperties: false
      required: [schemaVersion]
      description: |
        Component package envelope (GCP component platform).
        Draft may omit package (PG-only manifest subset); published requires package.url + package.sha256.
      properties:
        schemaVersion:
          type: integer
          enum: [2]
        package:
          type: object
          additionalProperties: false
          required: [url, sha256]
          properties:
            url:
              type: string
              format: uri
              description: Nexus URL of package.manifest.json (required when status is published)
            sha256:
              type: string
              pattern: "^sha256:[a-f0-9]{64}$"
        manifest:
          type: object
          description: Type-specific resolve subset (build, pipeline, branching, …)
          additionalProperties: true

    PackageManifest:
      type: object
      additionalProperties: false
      required: [schemaVersion, componentType, componentName, version, files]
      description: Immutable component package manifest stored in Nexus
      properties:
        schemaVersion:
          type: integer
          enum: [1]
        componentType:
          type: string
        componentName:
          type: string
        version:
          type: string
        files:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [path, sha256]
            properties:
              path:
                type: string
              sha256:
                type: string
                pattern: "^sha256:[a-f0-9]{64}$"
              role:
                type: string
                enum: [primary, schema, containerfile, docs, archive, other]
              mediaType:
                type: string

    BuildReport:
      type: object
      required: [project, goldenPath, version, result]
      properties:
        project:
          type: string
        groupId:
          type: string
        artifactId:
          type: string
        goldenPath:
          type: string
        version:
          type: string
        configVersion:
          type: string
        branch:
          type: string
        buildUrl:
          type: string
        gitUrl:
          type: string
        result:
          type: string
          enum: [success, failure, aborted]
        channel:
          type: string
        requestedPin:
          type: string
        resolvedVersion:
          type: string
        failedStage:
          type: string
        outputs:
          type: array
          items:
            type: object
            required: [name, type]
            properties:
              name:
                type: string
              type:
                type: string
                enum: [image, liquibase-image, artifact]
              format:
                type: string
                example: zip
              ref:
                type: string
              digest:
                type: string
              sha256:
                type: string

    BuildReportRow:
      allOf:
        - $ref: "#/components/schemas/BuildReport"
        - type: object
          required: [id, reportedAt]
          properties:
            id:
              type: integer
            reportedAt:
              type: string
              format: date-time

    PublishComponentVersion:
      type: object
      required: [version]
      properties:
        version:
          type: string
          example: "0.2.0"
        metadata:
          type: object
          additionalProperties: true
        contentRef:
          oneOf:
            - $ref: "#/components/schemas/ContentRefV2"
            - $ref: "#/components/schemas/GPContentContentRef"
            - type: object
              additionalProperties: true
              description: Legacy artifactKey refs (migration only)
        actor:
          type: string
          example: platform-bot

    RegisterComponentPackage:
      type: object
      properties:
        manifest:
          type: object
          description: Type-specific resolve subset stored in content_ref v2
          additionalProperties: true
        actor:
          type: string

    ValidateComponentPackageResult:
      type: object
      required: [valid, issues]
      properties:
        valid:
          type: boolean
        issues:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string

    RegisterComponentPackageResult:
      type: object
      required: [type, name, version, filesUploaded, contentRef]
      properties:
        type:
          type: string
        name:
          type: string
        version:
          type: string
        packageUrl:
          type: string
          format: uri
        packageSha256:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
        filesUploaded:
          type: integer
        contentRef:
          $ref: "#/components/schemas/ContentRefV2"

    ComponentVersionPromoteResult:
      type: object
      required: [type, name, version, status]
      properties:
        type:
          type: string
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [published]

    CompositionPinBlocker:
      type: object
      required: [type, name, version, status]
      properties:
        type:
          type: string
          example: gp-content
        name:
          type: string
          example: go-app
        version:
          type: string
          example: 1.0.1-draft
        status:
          type: string
          example: draft

    GPPromoteBlockedError:
      type: object
      required: [error, blockingPins]
      properties:
        error:
          type: string
          example: gp composition has draft component pins
        blockingPins:
          type: array
          items:
            $ref: "#/components/schemas/CompositionPinBlocker"

    PublishGPReleaseResult:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        version:
          type: string
        status:
          type: string
        manifestHash:
          type: string
        manifestUrl:
          type: string
        resolvedVersion:
          type: string

    PublishGPRelease:
      type: object
      required: [version, composition, agentStackName, gpContentName, branchingModelName]
      properties:
        version:
          type: string
          example: "1.0.1"
        composition:
          type: object
          additionalProperties:
            type: string
          example:
            agent: "1.0.0"
            gp-content: "1.0.0"
            branching-model: "1.0.0"
        agentStackName:
          type: string
          example: coin-agent
          description: Registry name of the agent/executor runtime stack
        branchingModelName:
          type: string
          example: trunk-based
        gpContentName:
          type: string
          example: go-app
          description: Registry name of the gp-content component (may differ from GP profile name)
        gitExportTag:
          type: string
          example: go-app/v1.0.1
        actor:
          type: string

    UpdateGPDraft:
      type: object
      required: [composition, agentStackName, gpContentName, branchingModelName]
      properties:
        agentStackName:
          type: string
          example: coin-agent
        gpContentName:
          type: string
          example: go-app
        branchingModelName:
          type: string
          example: trunk-based
        composition:
          type: object
          additionalProperties:
            type: string
          example:
            agent: "1.0.0"
            gp-content: "1.0.0"
            branching-model: "1.0.0"
        actor:
          type: string

    BlastRadius:
      type: object
      required: [goldenPath, version, onThisVersion, onOtherVersions, onOlderVersions, totalOnGP, byVersion]
      properties:
        goldenPath:
          type: string
        version:
          type: string
        onThisVersion:
          type: integer
        onOtherVersions:
          type: integer
        onOlderVersions:
          type: integer
        totalOnGP:
          type: integer
        byVersion:
          type: array
          items:
            type: object
            required: [version, count]
            properties:
              version:
                type: string
              count:
                type: integer

    ReadyResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ready
        version:
          type: string
          example: "0.1.0"
        reason:
          type: string
          description: Present when status is not ready

    DashboardStats:
      type: object
      required: [projects, staleProjects, gpReleases, buildReports, goldenPaths]
      properties:
        projects:
          type: integer
        staleProjects:
          type: integer
        gpReleases:
          type: integer
        buildReports:
          type: integer
        goldenPaths:
          type: integer

    Project:
      type: object
      required: [name, goldenPath, version]
      properties:
        name:
          type: string
        groupId:
          type: string
        artifactId:
          type: string
        gitRepoName:
          type: string
        gitRepoUrl:
          type: string
        goldenPath:
          type: string
        version:
          type: string
        canaryMode:
          type: string
        branch:
          type: string
        lastBuildAt:
          type: string
          format: date-time

    ComponentPin:
      type: object
      required: [type, name, version]
      properties:
        type:
          type: string
        name:
          type: string
        version:
          type: string

    CanaryContext:
      type: object
      required:
        - project
        - gpName
        - canaryMode
        - rolloutEnabled
        - canaryPercent
        - projectBucket
        - useCanaryLine
        - stableVersion
        - canaryVersion
      properties:
        project:
          type: string
        gpName:
          type: string
        canaryMode:
          type: string
        rolloutEnabled:
          type: boolean
        canaryPercent:
          type: integer
        projectBucket:
          type: integer
        useCanaryLine:
          type: boolean
        stableVersion:
          type: string
        canaryVersion:
          type: string

    ResolvePreviewResult:
      type: object
      required: [requestedPin, resolvedVersion, channel, manifest]
      properties:
        requestedPin:
          type: string
        resolvedVersion:
          type: string
        channel:
          type: string
        manifest:
          type: object
          additionalProperties: true
        canaryContext:
          $ref: "#/components/schemas/CanaryContext"

    ComponentDetail:
      allOf:
        - $ref: "#/components/schemas/Component"
        - type: object
          required: [gpUsage]
          properties:
            gpUsage:
              type: array
              items:
                type: object
                required: [gpName, version, status]
                properties:
                  gpName:
                    type: string
                  version:
                    type: string
                  status:
                    type: string

    NextAgentVersion:
      type: object
      required: [stack, runtime, currentRev, nextRev, nextVersion]
      properties:
        stack:
          type: string
        runtime:
          type: string
        currentRev:
          type: integer
          description: Max existing -rN for runtime (0 if none)
        nextRev:
          type: integer
        nextVersion:
          type: string
          example: "1.22-r6"

    ComponentVersionDetail:
      type: object
      required: [type, name, version, status, metadata, createdAt]
      properties:
        type:
          type: string
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [draft, published]
          description: Component lifecycle (legacy `canary` tolerated until migration)
        metadata:
          type: object
          additionalProperties: true
        contentRef:
          oneOf:
            - $ref: "#/components/schemas/ContentRefV2"
            - $ref: "#/components/schemas/GPContentContentRef"
            - type: object
              additionalProperties: true
              description: Legacy artifactKey refs (migration only)
        createdAt:
          type: string
          format: date-time

    PaginatedListMeta:
      type: object
      required: [total, limit, offset]
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ProjectList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"

    GPRelease:
      type: object
      required: [name, version, status, createdAt]
      properties:
        name:
          type: string
        version:
          type: string
        status:
          type: string
        manifestHash:
          type: string
        manifestUrl:
          type: string
        gitExportTag:
          type: string
        createdAt:
          type: string
          format: date-time

    GPReleaseList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GPRelease"

    Component:
      type: object
      required: [type, name, versionCount, latestCreatedAt]
      properties:
        type:
          type: string
        name:
          type: string
        latestVersion:
          type: string
        versionCount:
          type: integer
        latestCreatedAt:
          type: string
          format: date-time

    ComponentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Component"

    CompositionItem:
      type: object
      required: [type, name, version]
      properties:
        type:
          type: string
        name:
          type: string
        version:
          type: string

    GPReleaseDetail:
      allOf:
        - $ref: "#/components/schemas/GPRelease"
        - type: object
          required: [composition]
          properties:
            composition:
              type: array
              items:
                $ref: "#/components/schemas/CompositionItem"

    AuditLogEntry:
      type: object
      required: [id, action, entityType, entityKey, payload, createdAt]
      properties:
        id:
          type: integer
          format: int64
        action:
          type: string
        entityType:
          type: string
        entityKey:
          type: string
        actor:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    AuditLogList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"

    GPProfileSlot:
      type: object
      required: [key, type, name]
      properties:
        key:
          type: string
        type:
          type: string
        name:
          type: string

    GPProfile:
      type: object
      required: [name, createdAt]
      properties:
        name:
          type: string
          example: go-app
        description:
          type: string
          example: Go applications golden path
        createdAt:
          type: string
          format: date-time

    BranchingModelBranchRule:
      type: object
      required: [name, pattern, versioning, publish]
      properties:
        name:
          type: string
        pattern:
          type: string
        versioning:
          type: object
          required: [template]
          properties:
            template:
              type: string
        publish:
          type: boolean

    BranchingModelPreviewRequest:
      type: object
      required: [model, scenarios]
      properties:
        model:
          type: object
          required: [name, branches]
          properties:
            name:
              type: string
            branches:
              type: array
              items:
                $ref: "#/components/schemas/BranchingModelBranchRule"
        scenarios:
          type: array
          items:
            type: object
            required: [id, branch]
            properties:
              id:
                type: string
              branch:
                type: string
              tagName:
                type: string
              tags:
                type: array
                items:
                  type: string
              requestPublish:
                type: boolean

    BranchingModelPreviewResult:
      type: object
      required: [patternHint, results]
      properties:
        patternHint:
          type: string
        results:
          type: array
          items:
            type: object
            required: [id, branchValid, publishOutcome]
            properties:
              id:
                type: string
              matchedRule:
                type: string
              branchValid:
                type: boolean
              branchError:
                type: string
              coinVersion:
                type: string
              versionError:
                type: string
              publishOutcome:
                type: string
                enum: [not-requested, allowed, denied]
              publishReason:
                type: string

    GpContentPreviewRequest:
      type: object
      required: [contentYaml]
      properties:
        contentYaml:
          type: string
        componentName:
          type: string
        project:
          type: string
        registryHost:
          type: string

    GpContentPreviewResult:
      type: object
      required: [valid, issues]
      properties:
        valid:
          type: boolean
        issues:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
        warnings:
          type: array
          items:
            type: string
        build:
          type: object
          additionalProperties: true
        pipeline:
          type: object
          additionalProperties: true
        capabilities:
          type: object
          additionalProperties: true

    AdminPrincipal:
      type: object
      required: [subject, roles, authMethod]
      properties:
        subject:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [admin, publisher, reader]
        authMethod:
          type: string
          enum: [api_key, oidc, local]
