openapi: 3.1.0
info:
  title: Coin Control Plane API
  version: 1.0.0
  description: Resolve manifest and build telemetry for Coin CI.

servers:
  - url: http://localhost:8090
    description: Local docker compose

paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK

  /ready:
    get:
      summary: Readiness probe (PostgreSQL ping)
      responses:
        "200":
          description: Ready
        "503":
          description: Not ready

  /v1/golden-paths/{name}/resolve:
    get:
      summary: Resolve manifest by semver pin
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: pin
          in: query
          required: true
          schema:
            type: string
          description: Semver pin (=1.0.0, ~1.0.0, ^1.0.0, *, or bare 1.0.0)
          example: "~1.0.0"
        - name: project
          in: query
          schema:
            type: string
          description: Project name for canary rules (MVP-3)
      responses:
        "200":
          description: Resolved manifest
          headers:
            X-Coin-Requested-Pin:
              schema:
                type: string
            X-Coin-Resolved-Version:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"
        "400":
          description: Invalid pin
        "404":
          description: GP release not found

  /v1/golden-paths/{name}/versions/{version}/manifest:
    get:
      summary: Resolve immutable manifest for GP release
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: version
          in: path
          required: true
          schema:
            type: string
          example: "1.0.0"
      responses:
        "200":
          description: Resolved manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manifest"
        "404":
          description: GP release not found
        "403":
          description: Version below catalog minimum
        "401":
          description: Unauthorized

  /v1/builds/report:
    post:
      summary: Report build telemetry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildReport"
      responses:
        "201":
          description: Accepted
        "401":
          description: Unauthorized

  /v1/admin/stats:
    get:
      summary: Dashboard counts
      security:
        - adminKey: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized

  /v1/admin/projects:
    get:
      summary: List projects (latest GP binding)
      security:
        - adminKey: []
      parameters:
        - name: goldenPath
          in: query
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
        "401":
          description: Unauthorized

  /v1/admin/golden-paths:
    get:
      summary: List published GP releases
      security:
        - adminKey: []
      parameters:
        - name: name
          in: query
          schema:
            type: string
          example: go-app
      responses:
        "200":
          description: GP release list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPReleaseList"
        "401":
          description: Unauthorized

  /v1/admin/components/{type}/{name}/versions:
    post:
      summary: Publish component version (append-only)
      security:
        - adminKey: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          example: executor
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: coin-executor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishComponentVersion"
      responses:
        "201":
          description: Published
        "409":
          description: Version already exists
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions:
    post:
      summary: Publish GP release (append-only)
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishGPRelease"
      responses:
        "201":
          description: Published
        "400":
          description: Invalid composition or compatibility failure
        "409":
          description: GP version already exists
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions/{version}/blast-radius:
    get:
      summary: Blast radius — projects on GP versions
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
        - name: version
          in: path
          required: true
          schema:
            type: string
          example: "1.0.2"
      responses:
        "200":
          description: Blast radius counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlastRadius"
        "401":
          description: Unauthorized

  /v1/admin/scan:
    post:
      summary: Run fleet scanner (Gitea → project_bindings)
      security:
        - adminKey: []
      parameters:
        - name: force
          in: query
          schema:
            type: boolean
            default: false
          description: Rescan all repos ignoring last SHA
      responses:
        "200":
          description: Scan complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResponse"
        "207":
          description: Scan complete with repo failures
        "401":
          description: Unauthorized
        "500":
          description: Scan failed

  /v1/admin/components:
    get:
      summary: List component registry (read-only)
      security:
        - adminKey: []
      responses:
        "200":
          description: Component list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentList"
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/versions/{version}:
    get:
      summary: GP release detail with composition
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: GP release detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPReleaseDetail"
        "404":
          description: Not found
        "401":
          description: Unauthorized

  /v1/admin/me:
    get:
      summary: Current admin principal and RBAC roles
      security:
        - adminKey: []
      responses:
        "200":
          description: Principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPrincipal"
        "401":
          description: Unauthorized

  /v1/admin/audit-log:
    get:
      summary: Audit log (append-only mutations)
      security:
        - adminKey: []
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
          example: gp_release
        - name: action
          in: query
          schema:
            type: string
          example: publish_gp_release
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/names:
    get:
      summary: Supported golden path names (publish wizard)
      security:
        - adminKey: []
      responses:
        "200":
          description: GP names
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: string
        "401":
          description: Unauthorized

  /v1/admin/golden-paths/{name}/profile:
    get:
      summary: GP composition slots for publish wizard
      security:
        - adminKey: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          example: go-app
      responses:
        "200":
          description: GP profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GPProfile"
        "404":
          description: Unknown golden path
        "401":
          description: Unauthorized

  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics payload

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    adminKey:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Manifest:
      type: object
      required:
        - manifestVersion
        - manifestHash
        - goldenPath
        - executor
        - runtime
        - pipeline
        - orchestration
      properties:
        manifestVersion:
          type: integer
          example: 1
        manifestHash:
          type: string
          example: "sha256:abc..."
        goldenPath:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
            version:
              type: string
        executor:
          type: object
          properties:
            version:
              type: string
            url:
              type: string
            sha256:
              type: string
        runtime:
          type: object
          properties:
            image:
              type: string
            digest:
              type: string
        pipeline:
          type: object
          properties:
            stages:
              type: array
              items:
                type: object
        orchestration:
          $ref: "#/components/schemas/ContentRef"
        validateSchema:
          $ref: "#/components/schemas/ContentRef"
        dockerfileTemplate:
          $ref: "#/components/schemas/ContentRef"
        credentials:
          type: object
          additionalProperties:
            type: string

    ContentRef:
      type: object
      required: [url, sha256]
      properties:
        url:
          type: string
          format: uri
          description: Nexus URL of immutable content artifact
        sha256:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"

    BuildReport:
      type: object
      required: [project, goldenPath, version, result]
      properties:
        project:
          type: string
        goldenPath:
          type: string
        version:
          type: string
        branch:
          type: string
        buildUrl:
          type: string
        result:
          type: string
          enum: [success, failure, aborted]

    PublishComponentVersion:
      type: object
      required: [version]
      properties:
        version:
          type: string
          example: "0.2.0"
        metadata:
          type: object
          additionalProperties: true
        contentRef:
          type: object
          additionalProperties: true
        actor:
          type: string
          example: platform-bot

    PublishGPRelease:
      type: object
      required: [version, composition]
      properties:
        version:
          type: string
          example: "1.0.1"
        composition:
          type: object
          additionalProperties:
            type: string
          example:
            executor: "0.1.0"
            agent: "1.22.5"
            pipeline: "2.1.0"
            validate: "1.0.0"
            dockerfile: "1.0.0"
        gitExportTag:
          type: string
          example: go-app/v1.0.1
        actor:
          type: string

    BlastRadius:
      type: object
      required: [goldenPath, version, onThisVersion, onOtherVersions, onOlderVersions, totalOnGP, byVersion]
      properties:
        goldenPath:
          type: string
        version:
          type: string
        onThisVersion:
          type: integer
        onOtherVersions:
          type: integer
        onOlderVersions:
          type: integer
        totalOnGP:
          type: integer
        byVersion:
          type: array
          items:
            type: object
            required: [version, count]
            properties:
              version:
                type: string
              count:
                type: integer

    DashboardStats:
      type: object
      required: [projects, gpReleases, buildReports, goldenPaths]
      properties:
        projects:
          type: integer
        gpReleases:
          type: integer
        buildReports:
          type: integer
        goldenPaths:
          type: integer

    Project:
      type: object
      required: [name, goldenPath, version, lastSeenAt]
      properties:
        name:
          type: string
        goldenPath:
          type: string
        version:
          type: string
        gitUrl:
          type: string
        lastSeenAt:
          type: string
          format: date-time

    ProjectList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Project"

    GPRelease:
      type: object
      required: [name, version, status, createdAt]
      properties:
        name:
          type: string
        version:
          type: string
        status:
          type: string
        manifestHash:
          type: string
        manifestUrl:
          type: string
        gitExportTag:
          type: string
        createdAt:
          type: string
          format: date-time

    GPReleaseList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GPRelease"

    Component:
      type: object
      required: [type, name, versionCount, latestCreatedAt]
      properties:
        type:
          type: string
        name:
          type: string
        latestVersion:
          type: string
        versionCount:
          type: integer
        latestCreatedAt:
          type: string
          format: date-time

    ComponentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Component"

    CompositionItem:
      type: object
      required: [type, name, version]
      properties:
        type:
          type: string
        name:
          type: string
        version:
          type: string

    GPReleaseDetail:
      allOf:
        - $ref: "#/components/schemas/GPRelease"
        - type: object
          required: [composition]
          properties:
            composition:
              type: array
              items:
                $ref: "#/components/schemas/CompositionItem"

    ScanResult:
      type: object
      required: [reposTotal, reposScanned, reposSkipped, reposFailed, startedAt, finishedAt]
      properties:
        reposTotal:
          type: integer
        reposScanned:
          type: integer
        reposSkipped:
          type: integer
        reposFailed:
          type: integer
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time

    ScanResponse:
      type: object
      required: [status, result]
      properties:
        status:
          type: string
        result:
          $ref: "#/components/schemas/ScanResult"

    AuditLogEntry:
      type: object
      required: [id, action, entityType, entityKey, payload, createdAt]
      properties:
        id:
          type: integer
          format: int64
        action:
          type: string
        entityType:
          type: string
        entityKey:
          type: string
        actor:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    AuditLogList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"

    GPProfileSlot:
      type: object
      required: [key, type, name]
      properties:
        key:
          type: string
        type:
          type: string
        name:
          type: string

    GPProfile:
      type: object
      required: [name, slots]
      properties:
        name:
          type: string
        slots:
          type: array
          items:
            $ref: "#/components/schemas/GPProfileSlot"

    AdminPrincipal:
      type: object
      required: [subject, roles, authMethod]
      properties:
        subject:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [admin, publisher, reader]
        authMethod:
          type: string
          enum: [api_key, oidc, local]
