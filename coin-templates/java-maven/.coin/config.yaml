version: 1

coin:
  template: java-maven
  templateVersion: "1.0.0"

# ── Jenkins читает только эту секцию ────────────────────────────────────────
agent:
  stack: java-maven
  runtime:
    java: "17"
  publishRegistry: nexus-docker

# ── coin CLI ─────────────────────────────────────────────────────────────────
project:
  name: my-service

container:
  port: 8080
  command: ["java", "-jar", "/app/app.jar"]

pipeline:
  test:
    enabled: true
  build:
    enabled: true
    target: container
    dockerfileTemplate: java-maven
  publish:
    enabled: true
    when: tag

quality:
  sonar:
    enabled: false
    projectKey: my-service
