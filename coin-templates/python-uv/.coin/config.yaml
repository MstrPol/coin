version: 1

coin:
  template: python-uv
  templateVersion: "1.0.0"
  versioning:
    mode: corporate
    tagPrefix: "v"

# ── Jenkins читает только эту секцию ────────────────────────────────────────
agent:
  stack: python-uv
  runtime:
    python: "3.13"
  publishRegistry: nexus-docker   # Jenkins Credential ID для публикации образа

# ── coin CLI ─────────────────────────────────────────────────────────────────
project:
  name: my-service

container:
  port: 8080
  command: ["python", "-m", "my_service"]

pipeline:
  test:
    enabled: true
    # Стандарт Coin: uv sync --frozen && uv run pytest.
    # postCommands:
    #   - uv run ruff check .
  build:
    enabled: true
    target: container          # package | container
    dockerfileTemplate: python-uv
  publish:
    enabled: true
    when: tag                  # tag | branch | always | never

quality:
  sonar:
    enabled: false
    projectKey: my-service
