version: 1

coin:
  template: go
  templateVersion: "1.0.0"
  versioning:
    mode: corporate
    tagPrefix: "v"

# ── Jenkins читает только эту секцию ────────────────────────────────────────
agent:
  stack: go
  runtime:
    go: "1.22"
  publishRegistry: nexus-docker

# ── coin CLI ─────────────────────────────────────────────────────────────────
project:
  name: my-service

container:
  port: 8080
  command: ["/app/app"]

pipeline:
  test:
    enabled: true
  build:
    enabled: true
    target: container
    dockerfileTemplate: go
  publish:
    enabled: true
    when: tag

quality:
  sonar:
    enabled: false
    projectKey: my-service
