version: 1

coin:
  template: python-pip
  templateVersion: "1.0.0"
  versioning:
    mode: corporate
    tagPrefix: "v"

# ── Jenkins читает только эту секцию ────────────────────────────────────────
agent:
  stack: python-pip
  runtime:
    python: "3.13"
  publishRegistry: nexus-docker

# ── coin CLI ─────────────────────────────────────────────────────────────────
project:
  name: my-service

container:
  port: 8080
  command: ["python", "-m", "my_service"]

pipeline:
  test:
    enabled: true
  build:
    enabled: true
    target: container
    dockerfileTemplate: python-pip
  publish:
    enabled: true
    when: tag

quality:
  sonar:
    enabled: false
    projectKey: my-service
