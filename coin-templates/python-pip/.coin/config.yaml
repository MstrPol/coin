version: 1

coin:
  template: python-pip
  templateVersion: "1.0.0"
  mode: standard
  versioning:
    mode: corporate
    tagPrefix: "v"

project:
  name: my-service
  stack: python-pip

runtime:
  python: "3.13"

container:
  port: 8080
  command: "python -m my_service"

pipeline:
  test:
    enabled: true
  build:
    enabled: true
    target: container
    dockerfileTemplate: python-pip
  publish:
    enabled: true
    registry: nexus-docker
    when: tag

quality:
  sonar:
    enabled: false
    projectKey: my-service

deploy:
  enabled: false
